name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
      - master

permissions:
  contents: write

jobs:
  auto-tag:
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      tag_name: ${{ steps.check.outputs.tag_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Check and create tag
        id: check
        run: |
          VERSION=$(jq -r .version package.json)
          TAG="v${VERSION}"
          echo "tag_name=${TAG}" >> "$GITHUB_OUTPUT"

          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "Tag ${TAG} already exists, skipping"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "Creating tag ${TAG}"
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: [auto-tag]
    if: |
      always() &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.auto-tag.outputs.should_build == 'true' ||
       github.event_name == 'workflow_dispatch')
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            label: macos-arm64
          - runner: windows-latest
            label: win-x64
          - runner: ubuntu-latest
            label: linux-x64

    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_ENV: stable
      RELEASE_BASE_URL: ${{ (startsWith(github.ref, 'refs/tags/v') || needs.auto-tag.outputs.should_build == 'true') && format('https://github.com/{0}/releases/latest/download', github.repository) || '' }}
      ELECTROBUN_DEVELOPER_ID: ${{ secrets.ELECTROBUN_DEVELOPER_ID }}
      ELECTROBUN_TEAMID: ${{ secrets.ELECTROBUN_TEAMID }}
      ELECTROBUN_APPLEID: ${{ secrets.ELECTROBUN_APPLEID }}
      ELECTROBUN_APPLEIDPASS: ${{ secrets.ELECTROBUN_APPLEIDPASS }}

    steps:
      - uses: actions/checkout@v5

      - name: Install Apple certificate
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERT_PATH
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        shell: bash
        run: bun run build:stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: piwork-${{ matrix.label }}-${{ env.RELEASE_ENV }}
          path: artifacts/
          if-no-files-found: error

  publish:
    needs: [auto-tag, build]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (startsWith(github.ref, 'refs/tags/v') ||
       needs.auto-tag.outputs.should_build == 'true')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v5
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || needs.auto-tag.outputs.tag_name }}
          files: release-artifacts/**
